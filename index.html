<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D House Planning Form</title>
</head>
<body>
    <h1>3D House Planning Parameters</h1>
    <form>
        <label for="length">Length (m):</label>
        <input type="number" id="length" name="length" required><br><br>

        <label for="width">Width (m):</label>
        <input type="number" id="width" name="width" required><br><br>

        <label for="height">Height (m):</label>
        <input type="number" id="height" name="height" required><br><br>

        <label for="rooms">Number of Rooms:</label>
        <input type="number" id="rooms" name="rooms" required><br><br>

        <label for="floors">Number of Floors:</label>
        <input type="number" id="floors" name="floors" required><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
